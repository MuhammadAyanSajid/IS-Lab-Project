<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>G-DES Secure Vault - Authentication Node</title>
    <!-- Bootstrap 5 CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css" rel="stylesheet">
    
    <!-- Link to your existing Cyberpunk stylesheet -->
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
    <style>
        .login-container {
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }
        .login-card {
            width: 100%;
            max-width: 420px;
        }
    </style>
</head>
<body>
    <div class="login-container">
        <div class="card card-custom card-cyan p-4 login-card">
            <div class="text-center mb-4">
                <i class="bi bi-terminal-fill text-info fs-1 brand-glow d-block mb-2"></i>
                <h4 class="text-white fw-bold mb-1 brand-glow">G-DES // LOGIN</h4>
                <p class="text-muted small">SYSTEM GATEWAY AUTHENTICATION</p>
            </div>

            <!-- Error message area -->
            {% if error %}
            <div class="alert bg-transparent border-danger text-danger text-center font-monospace mb-3 error-overlay-console">
                <i class="bi bi-exclamation-triangle-fill"></i> {{ error }}
            </div>
            {% endif %}

            <form action="/login" method="POST">
                <div class="mb-3">
                    <label class="form-label" for="usernameInput">NODE_USER_ID</label>
                    <input type="text" class="form-control form-control-cyber" name="username" id="usernameInput" required title="Enter your system username" placeholder="e.g., admin_account">
                </div>
                <div class="mb-3">
                    <label class="form-label" for="passwordInput">SECRET_PASSPHRASE</label>
                    <input type="password" class="form-control form-control-cyber" name="password" id="passwordInput" required title="Enter your system passphrase" placeholder="••••••••">
                </div>
                <button type="submit" class="btn btn-cyber-cyan w-100 py-2 mt-3">
                    <i class="bi bi-key-fill"></i> AUTHENTICATE_USER
                </button>
            </form>
        </div>
    </div>
</body>
</html>
